name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            goos: windows
            goarch: amd64
            ext: .exe
            asset: hixns-agent-windows-amd64.exe
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            ext: ""
            asset: hixns-agent-linux-amd64
          - os: macos-latest
            goos: darwin
            goarch: amd64
            ext: ""
            asset: hixns-agent-macos-amd64
          - os: macos-latest
            goos: darwin
            goarch: arm64
            ext: ""
            asset: hixns-agent-macos-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: agent-go/go.sum

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Copy frontend to Go embed dir
        shell: bash
        run: |
          rm -rf agent-go/dist
          cp -r dist agent-go/dist

      - name: Bundle Hermes Agent
        shell: bash
        run: |
          # 创建独立 venv 并安装 hermes-agent
          python -m venv build/hermes-venv
          if [ "${{ matrix.goos }}" = "windows" ]; then
            source build/hermes-venv/Scripts/activate
          else
            source build/hermes-venv/bin/activate
          fi
          pip install --upgrade pip
          pip install hermes-agent 2>/dev/null || pip install hermes-ai-agent 2>/dev/null || echo "hermes-agent not on PyPI, creating minimal bundle"

          # 创建 bundled 目录结构
          BUNDLE_DIR="build/${{ matrix.goos }}-${{ matrix.goarch }}/bundled/hermes-agent"
          mkdir -p "$BUNDLE_DIR"

          # 复制 venv
          if [ "${{ matrix.goos }}" = "windows" ]; then
            cp -r build/hermes-venv "$BUNDLE_DIR/venv"
          else
            cp -r build/hermes-venv "$BUNDLE_DIR/venv"
          fi

          # 清理不必要的文件
          find "$BUNDLE_DIR" -type d -name '__pycache__' -exec rm -rf {} + 2>/dev/null || true
          find "$BUNDLE_DIR" -name '*.pyc' -delete 2>/dev/null || true
          rm -rf "$BUNDLE_DIR/venv/share" 2>/dev/null || true

          echo "Hermes bundle size: $(du -sh $BUNDLE_DIR | cut -f1)"

      - name: Build Windows resource (Windows only)
        if: matrix.goos == 'windows'
        shell: bash
        run: |
          cd agent-go
          windres --preprocessor=cat resource.rc -o resource_windows_amd64.syso || echo "Using pre-built .syso"

      - name: Build Go binary
        env:
          CGO_ENABLED: 0
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        shell: bash
        run: |
          cd agent-go
          LDFLAGS="-s -w -X main.version=${{ github.ref_name }}"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            LDFLAGS="$LDFLAGS -H windowsgui"
          fi
          go build -ldflags="$LDFLAGS" -o ../build/${{ matrix.asset }} .

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: build/${{ matrix.asset }}

      - name: Build Windows Installer (Windows only)
        if: matrix.goos == 'windows'
        shell: cmd
        run: |
          mkdir build\windows-amd64 2>nul
          copy build\%ASSET% build\windows-amd64\hixns-agent.exe
          mkdir build\installer 2>nul
          "C:\Program Files (x86)\Inno Setup 6\iscc.exe" scripts\installer.iss
        env:
          ASSET: ${{ matrix.asset }}

      - name: Upload Windows Installer
        if: matrix.goos == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: HiXNS-Setup
          path: build/installer/*.exe

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release
          for dir in artifacts/*/; do
            cp "$dir"* release/ 2>/dev/null || true
          done
          chmod +x release/hixns-agent-linux-* release/hixns-agent-macos-* 2>/dev/null || true
          ls -lh release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Hi!XNS ${{ github.ref_name }}"
          body: |
            ## Hi!XNS ${{ github.ref_name }}

            ### 下载
            | 平台 | 文件 | 说明 |
            |------|------|------|
            | **Windows 安装包** | `HiXNS-Setup-0.3.0.exe` | ⭐ 推荐，含 Hermes Agent |
            | Windows x64 | `hixns-agent-windows-amd64.exe` | 单文件版 |
            | Linux x64 | `hixns-agent-linux-amd64` | |
            | macOS Intel | `hixns-agent-macos-amd64` | |
            | macOS Apple Silicon | `hixns-agent-macos-arm64` | |

            ### 安装说明
            **Windows**: 下载安装包，双击安装。含内嵌 Hermes Agent，无需额外安装。

            ### 更新内容
            - 无边框窗口 + 自定义标题栏
            - 启动界面 (Logo动画+进度条)
            - iOS 27 级毛玻璃 UI
            - WebGL 极光背景
            - 12项功能优化
          files: release/*
          draft: false
          prerelease: false
