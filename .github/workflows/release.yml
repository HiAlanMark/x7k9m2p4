name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows/amd64
            asset: hixns-agent-windows-amd64.exe
          - os: ubuntu-latest
            platform: linux/amd64
            asset: hixns-agent-linux-amd64
          - os: macos-latest
            platform: darwin/universal
            asset: hixns-agent-macos-universal

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Go mod tidy
        run: go mod tidy

      # Linux 依赖
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev

      # 构建 Wails 应用
      - name: Build Wails App
        run: wails build -clean -trimpath -platform ${{ matrix.platform }} -o ${{ matrix.asset }}

      # Windows NSIS 安装器
      - name: Build Windows NSIS Installer
        if: runner.os == 'Windows'
        run: wails build -clean -trimpath -platform windows/amd64 -nsis -o hixns-agent.exe

      # 上传产物
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: build/bin/*

      - name: Upload NSIS installer
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: HiXNS-Setup-windows
          path: build/bin/*-amd64-installer.exe

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release
          for dir in artifacts/*/; do
            cp "$dir"* release/ 2>/dev/null || true
          done
          chmod +x release/hixns-agent-linux-* release/hixns-agent-macos-* 2>/dev/null || true
          ls -lh release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Hi!XNS ${{ github.ref_name }}"
          body: |
            ## Hi!XNS ${{ github.ref_name }}

            ### 🚀 架构升级：迁移到 Wails v2

            本版本从 go-webview 迁移到 Wails v2 框架，彻底解决窗口控制问题。

            ### 下载安装包
            | 平台 | 安装包 | 说明 |
            |------|--------|------|
            | **Windows** | `*-installer.exe` | NSIS 安装器 |
            | **macOS** | `*-macos-universal` | Intel + Apple Silicon |
            | **Linux** | `*-linux-amd64` | chmod +x 后直接运行 |

            ### 改进
            - ✅ 无边框窗口 — Wails `Frameless: true`
            - ✅ 顶部拖拽 — CSS `--wails-draggable: drag`
            - ✅ 禁用右键 — `EnableDefaultContextMenu: false`
            - ✅ 无启动白屏 — `StartHidden: true` + DOM ready 后显示
            - ✅ 最小窗口 900×600
            - ✅ 自动跟随系统主题
            - ✅ NSIS 安装器（替代 Inno Setup）
          files: release/*
          draft: false
          prerelease: false
