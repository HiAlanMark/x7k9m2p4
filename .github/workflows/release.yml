name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows/amd64
            asset: hixns-agent.exe
          - os: ubuntu-22.04
            platform: linux/amd64
            asset: hixns-agent
          - os: macos-latest
            platform: darwin/universal
            asset: hixns-agent

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: false

      # ── 平台依赖 ──────────────────────────────────────
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev libappindicator3-dev libfuse2

      - name: Setup Windows build (MSVC)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Set CGO for Windows
        if: runner.os == 'Windows'
        shell: bash
        run: |
          echo "CGO_ENABLED=1" >> $GITHUB_ENV
          echo "CC=cl" >> $GITHUB_ENV

      - name: Install NSIS
        if: runner.os == 'Windows'
        uses: negrutiu/nsis-install@v1

      # ── 前端 ──────────────────────────────────────────
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      # ── Go ────────────────────────────────────────────
      - name: Go mod tidy
        run: go mod tidy

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      # ── 1. 构建 Wails 二进制 ──────────────────────────
      - name: Build Wails binary
        shell: bash
        run: |
          EXTRA_FLAGS=""
          if [ "${{ runner.os }}" = "Linux" ]; then
            pkg-config --exists webkit2gtk-4.1 && EXTRA_FLAGS="-tags webkit2_41" || true
          fi
          # Windows 跳过独立二进制构建，直接走 NSIS 步骤
          if [ "${{ runner.os }}" != "Windows" ]; then
            wails build -clean -trimpath -s -skipbindings -platform ${{ matrix.platform }} -o ${{ matrix.asset }} -v 2 $EXTRA_FLAGS
            echo "=== Build output ==="
            find build/bin -type f | sort
          fi

      # ── 2. 克隆 Hermes 源码 ───────────────────────────
      - name: Clone Hermes source
        shell: bash
        run: |
          git clone --depth 1 https://github.com/NousResearch/hermes-agent.git /tmp/hermes-src

      # ── 3. 构建 Hermes 完整运行环境 ───────────────────
      - name: Build Hermes Environment (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          BUILD_DIR="build/bin"
          HERMES_DIR="$BUILD_DIR/hermes-agent"
          PYTHON_DIR="$BUILD_DIR/hermes-python"
          mkdir -p "$HERMES_DIR" "$PYTHON_DIR"

          # 复制 Hermes 源码
          for f in run_agent.py model_tools.py toolsets.py cli.py hermes_state.py hermes_constants.py hermes_logging.py batch_runner.py; do
            [ -f "/tmp/hermes-src/$f" ] && cp "/tmp/hermes-src/$f" "$HERMES_DIR/"
          done
          for d in agent tools hermes_cli gateway plugins cron acp_adapter tui_gateway skills; do
            [ -d "/tmp/hermes-src/$d" ] && cp -r "/tmp/hermes-src/$d" "$HERMES_DIR/$d"
          done
          [ -f "/tmp/hermes-src/pyproject.toml" ] && cp "/tmp/hermes-src/pyproject.toml" "$HERMES_DIR/"

          # 下载嵌入式 Python
          curl -fsSL "https://www.python.org/ftp/python/3.11.9/python-3.11.9-embed-amd64.zip" -o /tmp/py.zip
          unzip -q /tmp/py.zip -d "$PYTHON_DIR/"
          rm /tmp/py.zip

          # 启用 site 模块
          echo "import site" >> "$PYTHON_DIR/python311._pth"

          # 安装 pip
          curl -fsSL "https://bootstrap.pypa.io/get-pip.py" -o "$PYTHON_DIR/get-pip.py"
          "$PYTHON_DIR/python.exe" "$PYTHON_DIR/get-pip.py" --no-warn-script-location

          # 安装 Hermes 核心依赖
          "$PYTHON_DIR/python.exe" -m pip install --no-warn-script-location \
            aiohttp pydantic pyyaml rich httpx openai tiktoken \
            beautifulsoup4 lxml playwright python-dotenv

          # 创建启动脚本
          cat > "$HERMES_DIR/run-hermes.bat" << 'EOF'
          @echo off
          set SCRIPT_DIR=%~dp0
          set PYTHON_DIR=%SCRIPT_DIR%..\hermes-python
          "%PYTHON_DIR%\python.exe" -m hermes_cli %*
          EOF

          # 清理
          find "$HERMES_DIR" -type d -name '__pycache__' -exec rm -rf {} + 2>/dev/null || true
          rm -rf /tmp/hermes-src

          echo "=== Windows Hermes bundled ==="
          du -sh "$HERMES_DIR" "$PYTHON_DIR"

      - name: Build Hermes Environment (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          BUILD_DIR="build/bin"
          HERMES_DIR="$BUILD_DIR/hermes-agent"
          PYTHON_DIR="$BUILD_DIR/hermes-python"
          mkdir -p "$HERMES_DIR" "$PYTHON_DIR"

          # 复制 Hermes 源码
          for f in run_agent.py model_tools.py toolsets.py cli.py hermes_state.py hermes_constants.py hermes_logging.py batch_runner.py; do
            [ -f "/tmp/hermes-src/$f" ] && cp "/tmp/hermes-src/$f" "$HERMES_DIR/"
          done
          for d in agent tools hermes_cli gateway plugins cron acp_adapter tui_gateway skills; do
            [ -d "/tmp/hermes-src/$d" ] && cp -r "/tmp/hermes-src/$d" "$HERMES_DIR/$d"
          done
          [ -f "/tmp/hermes-src/pyproject.toml" ] && cp "/tmp/hermes-src/pyproject.toml" "$HERMES_DIR/"

          # 创建 venv
          python3 -m venv "$PYTHON_DIR"
          source "$PYTHON_DIR/bin/activate"

          # 安装 Hermes 核心依赖
          pip install --no-cache-dir \
            aiohttp pydantic pyyaml rich httpx openai tiktoken \
            beautifulsoup4 lxml playwright python-dotenv

          deactivate

          # 创建启动脚本
          cat > "$HERMES_DIR/run-hermes.sh" << 'SCRIPT'
          #!/bin/bash
          SCRIPT_DIR="$(cd "$(dirname "$0")" && pwd)"
          PYTHON_DIR="$SCRIPT_DIR/../hermes-python"
          exec "$PYTHON_DIR/bin/python3" -m hermes_cli "$@"
          SCRIPT
          chmod +x "$HERMES_DIR/run-hermes.sh"

          # 清理
          find "$HERMES_DIR" -type d -name '__pycache__' -exec rm -rf {} + 2>/dev/null || true
          rm -rf /tmp/hermes-src
          find "$PYTHON_DIR" -type d -name '__pycache__' -exec rm -rf {} + 2>/dev/null || true

          echo "=== ${{ runner.os }} Hermes bundled ==="
          du -sh "$HERMES_DIR" "$PYTHON_DIR"

      # ── 4. 构建安装包 ─────────────────────────────────
      # Windows: 用自定义 NSIS 脚本打包（包含 Hermes）
      - name: Build Windows NSIS Installer
        if: runner.os == 'Windows'
        shell: bash
        run: |
          echo "=== Auto-building with Wails ==="
          wails build -trimpath -s -skipbindings -platform windows/amd64 -v 2

          echo "=== Verifying build artifacts ==="
          ls -lh build/bin/hixns-agent.exe
          du -sh build/bin/hermes-agent build/bin/hermes-python 2>/dev/null || true

          echo "=== Creating NSIS installer ==="
          WIN_ROOT="$(cygpath -w "$PWD")"
          echo "Project root (Windows): $WIN_ROOT"
          cd "$WIN_ROOT"
          makensis build\\windows\\installer.nsi

          echo "=== Checking installer ==="
          ls -lh build/bin/*.exe 2>/dev/null

          if [ -f "build/bin/HiXNS-Windows-x64-Setup.exe" ]; then
            echo "INSTALLER OK: build/bin/HiXNS-Windows-x64-Setup.exe"
          else
            echo "::error::Installer not found!"
            find build -name "*.exe" 2>/dev/null
            exit 1
          fi

      # Linux: 手动构建 AppImage
      - name: Build Linux AppImage
        if: runner.os == 'Linux'
        shell: bash
        run: |
          BINARY="build/bin/${{ matrix.asset }}"
          APPDIR="$GITHUB_WORKSPACE/AppDir"
          rm -rf "$APPDIR"
          mkdir -p "$APPDIR/usr/bin" "$APPDIR/usr/share/icons/hicolor/256x256/apps"

          # 复制二进制
          cp "$BINARY" "$APPDIR/usr/bin/hixns-agent"
          # 复制 Hermes
          cp -r build/bin/hermes-agent "$APPDIR/usr/bin/" 2>/dev/null || true
          cp -r build/bin/hermes-python "$APPDIR/usr/bin/" 2>/dev/null || true

          # .desktop
          cat > "$APPDIR/HiXNS.desktop" << 'EOF'
          [Desktop Entry]
          Name=HiXNS
          Comment=Hi!XNS AI Agent Desktop
          Exec=hixns-agent
          Icon=HiXNS
          Type=Application
          Categories=Utility;
          EOF

          # 图标
          cp build/appicon.png "$APPDIR/HiXNS.png" 2>/dev/null || true

          # AppRun
          cat > "$APPDIR/AppRun" << 'EOF'
          #!/bin/bash
          HERE="$(dirname "$(readlink -f "${0}")")"
          export PATH="$HERE/usr/bin:$PATH"
          export LD_LIBRARY_PATH="$HERE/usr/lib:$LD_LIBRARY_PATH"
          exec "$HERE/usr/bin/hixns-agent" "$@"
          EOF
          chmod +x "$APPDIR/AppRun"

          # 下载 appimagetool
          curl -fsSL "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage" -o /tmp/appimagetool
          chmod +x /tmp/appimagetool
          cd /tmp && ./appimagetool --appimage-extract && cd "$GITHUB_WORKSPACE"

          # 打包
          APPIMAGE_EXE_NAME="HiXNS-Linux-x86_64" /tmp/squashfs-root/AppRun \
            "$APPDIR" \
            "build/bin/HiXNS-Linux-x86_64.AppImage" \
            2>&1 | tail -20

          echo "=== AppImage output ==="
          ls -lh "build/bin/HiXNS-Linux-x86_64.AppImage" 2>/dev/null || echo "AppImage not found"
          find build/bin -name "*.AppImage" -type f

      # macOS: 用 create-dmg
      - name: Build macOS DMG
        if: runner.os == 'macOS'
        shell: bash
        run: |
          # Wails 在 macOS 上生成 .app bundle
          APP_BUNDLE="build/bin/${{ matrix.asset }}.app"
          if [ ! -d "$APP_BUNDLE" ]; then
            BINARY="build/bin/${{ matrix.asset }}"
            if [ -f "$BINARY" ]; then
              echo "Binary found, creating .app bundle manually"
              APP_BUNDLE="build/bin/HiXNS.app"
              mkdir -p "$APP_BUNDLE/Contents/MacOS" "$APP_BUNDLE/Contents/Resources"
              cp "$BINARY" "$APP_BUNDLE/Contents/MacOS/hixns-agent"
              cat > "$APP_BUNDLE/Contents/Info.plist" << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleName</key><string>Hi!XNS</string>
              <key>CFBundleDisplayName</key><string>Hi!XNS</string>
              <key>CFBundleIdentifier</key><string>com.hixns.agent</string>
              <key>CFBundleVersion</key><string>${{ github.ref_name }}</string>
              <key>CFBundleShortVersionString</key><string>${{ github.ref_name }}</string>
              <key>LSMinimumSystemVersion</key><string>12.0</string>
              <key>CFBundleExecutable</key><string>hixns-agent</string>
          </dict>
          </plist>
          PLIST
            else
              echo "::error::No macOS binary or .app found"
              find build/bin -type f
              exit 1
            fi
          fi

          echo "=== App bundle ==="
          find "$APP_BUNDLE" -maxdepth 3 -type f | head -20

          # 复制 Hermes 到 .app 内
          MACOS_DIR="$APP_BUNDLE/Contents/MacOS"
          cp -r build/bin/hermes-agent "$MACOS_DIR/" 2>/dev/null || true
          cp -r build/bin/hermes-python "$MACOS_DIR/" 2>/dev/null || true

          # 安装 create-dmg
          brew install create-dmg 2>/dev/null || true

          # 创建 DMG
          create-dmg \
            --volname "Hi!XNS" \
            --window-size 600 400 \
            "build/bin/HiXNS-macos.dmg" \
            "$APP_BUNDLE" 2>&1

          echo "=== DMG output ==="
          ls -lh "build/bin/HiXNS-macos.dmg" 2>/dev/null || echo "DMG not found"
          find build/bin -name "*.dmg" -type f

      # ── 5. 上传产物 ───────────────────────────────────
      - name: Upload Installer (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: HiXNS-Windows-x64-Setup.exe
          path: build/bin/HiXNS-Windows-x64-Setup.exe

      - name: Upload Installer (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: HiXNS-Linux-x86_64.AppImage
          path: build/bin/HiXNS-Linux-x86_64.AppImage

      - name: Upload Installer (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: HiXNS-macos.dmg
          path: build/bin/HiXNS-macos.dmg

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release
          for dir in artifacts/*/; do
            cp "$dir"* release/ 2>/dev/null || true
          done
          chmod +x release/*.AppImage 2>/dev/null || true
          echo "=== Release assets ==="
          ls -lh release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Hi!XNS ${{ github.ref_name }}"
          body: |
            ## Hi!XNS ${{ github.ref_name }}

            ### 全平台安装包 + Hermes 完整内嵌

            每个安装包都包含完整的 Hermes Agent 运行环境（Python 运行时 + 依赖预装），**开箱即用**。

            ### 下载

            | 平台 | 文件 | 说明 |
            |------|------|------|
            | **Windows** | `HiXNS-Windows-x64-Setup.exe` | NSIS 安装包，双击安装 |
            | **Linux** | `HiXNS-Linux-x86_64.AppImage` | AppImage，chmod +x 后运行 |
            | **macOS** | `HiXNS-macos.dmg` | DMG 安装包，拖拽安装 |

            ### 包含内容
            - Hi!XNS 桌面应用 (Wails v2)
            - Hermes Agent 完整运行环境
            - 内嵌 Python 运行时（无需系统安装 Python）
            - 所有依赖已预装

            ### 改进
            - 全平台安装包（NSIS / AppImage / DMG）
            - Hermes Agent 完整内嵌，开箱即用
            - 无边框窗口 + CSS 拖拽
            - 禁用右键菜单
            - 无启动白屏
          files: release/*
          draft: false
          prerelease: false
