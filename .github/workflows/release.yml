name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows/amd64
            asset: hixns-agent-windows-amd64.exe
          - os: ubuntu-22.04
            platform: linux/amd64
            asset: hixns-agent-linux-amd64
          - os: macos-latest
            platform: darwin/universal
            asset: hixns-agent-macos-universal

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: false

      # 平台依赖
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev
          # 优先安装 4.1，如果失败则安装 4.0
          sudo apt-get install -y libwebkit2gtk-4.1-dev || sudo apt-get install -y libwebkit2gtk-4.0-dev

      - name: Install Windows C compiler
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          update: true
          install: mingw-w64-x86_64-gcc mingw-w64-x86_64-make

      - name: Set CC for Windows
        if: runner.os == 'Windows'
        shell: bash
        run: |
          echo "C:/msys64/mingw64/bin" >> $GITHUB_PATH
          echo "CC=gcc" >> $GITHUB_ENV
          echo "CGO_ENABLED=1" >> $GITHUB_ENV
          gcc --version

      # 先构建前端
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      # Go 依赖
      - name: Go mod tidy
        run: go mod tidy

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      # 构建
      - name: Build Wails App
        id: build
        env:
          CGO_ENABLED: 1
        shell: bash
        run: |
          EXTRA_FLAGS=""
          if [ "${{ runner.os }}" = "Linux" ]; then
            pkg-config --exists webkit2gtk-4.1 && EXTRA_FLAGS="-tags webkit2_41" || true
          fi
          wails build -clean -trimpath -s -skipbindings -v -platform ${{ matrix.platform }} -o ${{ matrix.asset }} $EXTRA_FLAGS 2>&1 | tee build.log
          BUILD_EXIT_CODE=${PIPESTATUS[0]}
          echo "=== Build directory contents ==="
          ls -R build/ || echo "build/ dir not found"
          if [ $BUILD_EXIT_CODE -ne 0 ]; then
            echo "::error::Wails build failed with exit code $BUILD_EXIT_CODE"
            exit $BUILD_EXIT_CODE
          fi

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ matrix.platform }}
          path: build.log

      # 上传
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: build/bin/**

      # Windows NSIS
      - name: Build Windows NSIS Installer
        if: runner.os == 'Windows'
        run: wails build -clean -trimpath -s -skipbindings -platform windows/amd64 -nsis -o hixns-agent.exe

      - name: Upload NSIS installer
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: HiXNS-Setup-windows
          path: build/bin/*-amd64-installer.exe

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release
          for dir in artifacts/*/; do
            cp "$dir"* release/ 2>/dev/null || true
          done
          chmod +x release/hixns-agent-linux-* release/hixns-agent-macos-* 2>/dev/null || true
          ls -lh release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Hi!XNS ${{ github.ref_name }}"
          body: |
            ## Hi!XNS ${{ github.ref_name }}

            ### 架构升级：迁移到 Wails v2

            从 go-webview 迁移到 Wails v2 框架，彻底解决窗口控制问题。

            ### 下载
            | 平台 | 文件 | 说明 |
            |------|------|------|
            | **Windows** | `hixns-agent-windows-amd64.exe` | 直接运行 |
            | **macOS** | `hixns-agent-macos-universal` | Intel + Apple Silicon |
            | **Linux** | `hixns-agent-linux-amd64` | chmod +x 后运行 |

            ### 改进
            - 无边框窗口 + CSS 拖拽
            - 禁用右键菜单
            - 无启动白屏
            - 最小窗口 900×600
            - 自动跟随系统主题
          files: release/*
          draft: false
          prerelease: false
