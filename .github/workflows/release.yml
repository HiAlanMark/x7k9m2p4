name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-2022
            platform: windows/amd64
            asset: hixns-agent.exe
          - os: ubuntu-22.04
            platform: linux/amd64
            asset: hixns-agent
          - os: macos-latest
            platform: darwin/universal
            asset: hixns-agent

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync version from tag
        shell: bash
        run: |
          VER="${{ github.ref_name }}"
          VER="${VER#v}"
          echo "Syncing version: $VER"
          jq --arg v "$VER" '.info.productVersion = $v' wails.json > w.json && mv w.json wails.json
          jq --arg v "$VER" '.version = $v' frontend/package.json > p.json && mv p.json frontend/package.json

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: false

      # ── 平台依赖 ──────────────────────────────────────
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev libappindicator3-dev libfuse2

      - name: Setup Windows build (MSVC)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Set CGO for Windows
        if: runner.os == 'Windows'
        shell: bash
        run: |
          echo "CGO_ENABLED=1" >> $GITHUB_ENV
          echo "CC=cl" >> $GITHUB_ENV

      # ── 前端 ──────────────────────────────────────────
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      # ── Go ────────────────────────────────────────────
      - name: Go mod tidy
        run: go mod tidy

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      # ── 1. 构建 Wails 二进制 ──────────────────────────
      - name: Build Wails binary
        shell: bash
        run: |
          EXTRA_FLAGS=""
          if [ "${{ runner.os }}" = "Linux" ]; then
            pkg-config --exists webkit2gtk-4.1 && EXTRA_FLAGS="-tags webkit2_41" || true
          fi
          if [ "${{ runner.os }}" = "Windows" ]; then
            EXTRA_FLAGS="-webview2 embed"
          fi
          wails build -clean -trimpath -s -skipbindings -platform ${{ matrix.platform }} -o ${{ matrix.asset }} -v 2 $EXTRA_FLAGS
          echo "=== Build output ==="
          find build/bin -type f | sort

          # 复制图标到 build/appicon.png（AppImage / NSIS 需要）
          if [ -f src-tauri/icons/icon.png ]; then
            cp src-tauri/icons/icon.png build/appicon.png
          elif [ -f frontend/public/favicon.ico ]; then
            cp frontend/public/favicon.ico build/appicon.png
          fi

      # ── 2. 克隆 Hermes 源码 ───────────────────────────
      - name: Clone Hermes source
        shell: bash
        run: |
          git clone --depth 1 https://github.com/NousResearch/hermes-agent.git /tmp/hermes-src

      # ── 3. 构建 Hermes 完整运行环境 ───────────────────
      - name: Build Hermes Environment (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          BUILD_DIR="build/bin"
          HERMES_DIR="$BUILD_DIR/hermes-agent"
          PYTHON_DIR="$BUILD_DIR/hermes-python"
          mkdir -p "$HERMES_DIR" "$PYTHON_DIR"

          # 复制 Hermes 全部源码（必须包含所有 MAPPING 中的模块）
          for f in run_agent.py model_tools.py toolsets.py cli.py hermes_state.py hermes_constants.py hermes_logging.py batch_runner.py utils.py toolset_distributions.py trajectory_compressor.py hermes_bootstrap.py hermes_time.py rl_cli.py; do
            [ -f "/tmp/hermes-src/$f" ] && cp "/tmp/hermes-src/$f" "$HERMES_DIR/"
          done
          for d in agent tools hermes_cli gateway plugins cron acp_adapter tui_gateway skills providers hermes_bootstrap hermes_time rl_cli acp_registry; do
            [ -d "/tmp/hermes-src/$d" ] && cp -r "/tmp/hermes-src/$d" "$HERMES_DIR/$d"
          done
          [ -f "/tmp/hermes-src/pyproject.toml" ] && cp "/tmp/hermes-src/pyproject.toml" "$HERMES_DIR/"

          # 下载嵌入式 Python
          curl -fsSL "https://www.python.org/ftp/python/3.11.9/python-3.11.9-embed-amd64.zip" -o /tmp/py.zip
          unzip -q /tmp/py.zip -d "$PYTHON_DIR/"
          rm /tmp/py.zip

          # 启用 site 模块 + 添加 hermes-agent 源码路径（替代 PYTHONPATH）
          echo "import site" >> "$PYTHON_DIR/python311._pth"
          echo "../hermes-agent" >> "$PYTHON_DIR/python311._pth"

          # 安装 pip
          curl -fsSL "https://bootstrap.pypa.io/get-pip.py" -o "$PYTHON_DIR/get-pip.py"
          "$PYTHON_DIR/python.exe" "$PYTHON_DIR/get-pip.py" --no-warn-script-location

          # 安装 Hermes 核心依赖
          "$PYTHON_DIR/python.exe" -m pip install --no-warn-script-location \
            aiohttp pydantic pyyaml rich httpx openai tiktoken \
            beautifulsoup4 lxml python-dotenv

          # 创建启动脚本
          echo '@echo off' > "$HERMES_DIR/run-hermes.bat"
          echo 'setlocal' >> "$HERMES_DIR/run-hermes.bat"
          echo 'set SCRIPT_DIR=%~dp0' >> "$HERMES_DIR/run-hermes.bat"
          echo 'set PYTHON_DIR=%SCRIPT_DIR%..\hermes-python' >> "$HERMES_DIR/run-hermes.bat"
          echo 'set PYTHONPATH=%SCRIPT_DIR%' >> "$HERMES_DIR/run-hermes.bat"
          echo '"%PYTHON_DIR%\pythonw.exe" -m hermes_cli %*' >> "$HERMES_DIR/run-hermes.bat"

          # 清理测试痕迹和缓存
          find "$HERMES_DIR" -type d -name '__pycache__' -exec rm -rf {} + 2>/dev/null || true
          find "$HERMES_DIR" -name '*.pyc' -delete 2>/dev/null || true
          find "$HERMES_DIR" -type d -name '.pytest_cache' -exec rm -rf {} + 2>/dev/null || true
          find "$HERMES_DIR" -type d -name 'tests' -exec rm -rf {} + 2>/dev/null || true
          find "$HERMES_DIR" -type d -name '.git' -exec rm -rf {} + 2>/dev/null || true
          find "$HERMES_DIR" -type d -name '.plans' -exec rm -rf {} + 2>/dev/null || true
          find "$HERMES_DIR" -name 'test_*.py' -delete 2>/dev/null || true
          find "$HERMES_DIR" -name '*_test.py' -delete 2>/dev/null || true
          find "$HERMES_DIR" -name 'cron_meta.json' -delete 2>/dev/null || true
          find "$HERMES_DIR" -name '*.egg-info' -type d -exec rm -rf {} + 2>/dev/null || true
          # 清理 hermes-python 缓存和开发工具
          find "$PYTHON_DIR" -type d -name '__pycache__' -exec rm -rf {} + 2>/dev/null || true
          find "$PYTHON_DIR" -name '*.pyc' -delete 2>/dev/null || true
          find "$PYTHON_DIR" -name '*.dist-info' -type d -exec rm -rf {} + 2>/dev/null || true
          find "$PYTHON_DIR" -name '*.egg-info' -type d -exec rm -rf {} + 2>/dev/null || true
          rm -f "$PYTHON_DIR/get-pip.py"
          # 嵌入式 Python zip 不含 pythonw.exe，复制 python.exe 作为 pythonw.exe
          # Go 层用 CREATE_NO_WINDOW 阻止控制台弹窗，所以 python.exe 也不会弹窗
          if [ ! -f "$PYTHON_DIR/pythonw.exe" ]; then
            cp "$PYTHON_DIR/python.exe" "$PYTHON_DIR/pythonw.exe"
          fi
          rm -rf /tmp/hermes-src

          echo "=== Windows Hermes bundled ==="
          du -sh "$HERMES_DIR" "$PYTHON_DIR"

      - name: Build Hermes Environment (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          BUILD_DIR="build/bin"
          HERMES_DIR="$BUILD_DIR/hermes-agent"
          PYTHON_DIR="$BUILD_DIR/hermes-python"
          mkdir -p "$HERMES_DIR" "$PYTHON_DIR"

          # 复制 Hermes 全部源码（必须包含所有 MAPPING 中的模块）
          for f in run_agent.py model_tools.py toolsets.py cli.py hermes_state.py hermes_constants.py hermes_logging.py batch_runner.py utils.py toolset_distributions.py trajectory_compressor.py hermes_bootstrap.py hermes_time.py rl_cli.py; do
            [ -f "/tmp/hermes-src/$f" ] && cp "/tmp/hermes-src/$f" "$HERMES_DIR/"
          done
          for d in agent tools hermes_cli gateway plugins cron acp_adapter tui_gateway skills providers hermes_bootstrap hermes_time rl_cli acp_registry; do
            [ -d "/tmp/hermes-src/$d" ] && cp -r "/tmp/hermes-src/$d" "$HERMES_DIR/$d"
          done
          [ -f "/tmp/hermes-src/pyproject.toml" ] && cp "/tmp/hermes-src/pyproject.toml" "$HERMES_DIR/"

          # 创建 venv
          python3 -m venv "$PYTHON_DIR"
          source "$PYTHON_DIR/bin/activate"

          # 安装 Hermes 核心依赖
          pip install --no-cache-dir \
            aiohttp pydantic pyyaml rich httpx openai tiktoken \
            beautifulsoup4 lxml python-dotenv

          # 创建 .pth 文件：让 venv 能导入 bundled 源码（替代 PYTHONPATH）
          # 用 venv 自带的 python 获取版本号，避免系统 python 版本不匹配
          PYVER=$("$PYTHON_DIR/bin/python3" -c 'import sys; print(f"{sys.version_info.major}.{sys.version_info.minor}")')
          echo "$HERMES_DIR" > "$PYTHON_DIR/lib/python${PYVER}/site-packages/hermes_agent_bundled.pth"

          deactivate

          # 创建启动脚本
          echo '#!/bin/bash' > "$HERMES_DIR/run-hermes.sh"
          echo 'SCRIPT_DIR="$(cd "$(dirname "$0")" && pwd)"' >> "$HERMES_DIR/run-hermes.sh"
          echo 'PYTHON_DIR="$SCRIPT_DIR/../hermes-python"' >> "$HERMES_DIR/run-hermes.sh"
          echo 'export PYTHONPATH="$SCRIPT_DIR"' >> "$HERMES_DIR/run-hermes.sh"
          echo 'exec "$PYTHON_DIR/bin/python3" -m hermes_cli "$@"' >> "$HERMES_DIR/run-hermes.sh"
          chmod +x "$HERMES_DIR/run-hermes.sh"

          # 清理测试痕迹和缓存
          find "$HERMES_DIR" -type d -name '__pycache__' -exec rm -rf {} + 2>/dev/null || true
          find "$HERMES_DIR" -name '*.pyc' -delete 2>/dev/null || true
          find "$HERMES_DIR" -type d -name '.pytest_cache' -exec rm -rf {} + 2>/dev/null || true
          find "$HERMES_DIR" -type d -name 'tests' -exec rm -rf {} + 2>/dev/null || true
          find "$HERMES_DIR" -type d -name '.git' -exec rm -rf {} + 2>/dev/null || true
          find "$HERMES_DIR" -type d -name '.plans' -exec rm -rf {} + 2>/dev/null || true
          find "$HERMES_DIR" -name 'test_*.py' -delete 2>/dev/null || true
          find "$HERMES_DIR" -name '*_test.py' -delete 2>/dev/null || true
          find "$HERMES_DIR" -name 'cron_meta.json' -delete 2>/dev/null || true
          find "$HERMES_DIR" -name '*.egg-info' -type d -exec rm -rf {} + 2>/dev/null || true
          # 清理 hermes-python 缓存和 venv 冗余
          find "$PYTHON_DIR" -type d -name '__pycache__' -exec rm -rf {} + 2>/dev/null || true
          find "$PYTHON_DIR" -name '*.pyc' -delete 2>/dev/null || true
          find "$PYTHON_DIR" -name '*.dist-info' -type d -exec rm -rf {} + 2>/dev/null || true
          find "$PYTHON_DIR" -name '*.egg-info' -type d -exec rm -rf {} + 2>/dev/null || true
          rm -rf "$PYTHON_DIR/share" "$PYTHON_DIR/man" "$PYTHON_DIR/include"
          rm -rf /tmp/hermes-src

          echo "=== ${{ runner.os }} Hermes bundled ==="
          du -sh "$HERMES_DIR" "$PYTHON_DIR"

# ── 4. 构建安装包 ─────────────────────────────────
      # Windows: NSIS 打包 (windows-2022 runner 预装 NSIS 3.10)
      - name: Build Windows Installer
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Write-Host "=== Locating makensis ==="
          # windows-2022 runner includes NSIS 3.10
          $nsisPath = "C:\Program Files (x86)\NSIS\makensis.exe"
          if (-not (Test-Path $nsisPath)) {
            # Fallback: search PATH
            $cmd = Get-Command makensis.exe -ErrorAction SilentlyContinue
            if ($cmd) { $nsisPath = $cmd.Source }
          }
          if (-not (Test-Path $nsisPath)) {
            # Last resort: install via choco
            Write-Host "Installing NSIS via choco..."
            choco install nsis -y --no-progress
            $nsisPath = "C:\Program Files (x86)\NSIS\makensis.exe"
          }
          Write-Host "Using: $nsisPath"
          & $nsisPath /VERSION

          Write-Host "=== Building ==="
          Push-Location $env:GITHUB_WORKSPACE
          Write-Host "PWD: $(Get-Location)"
          Write-Host "Binary exists: $(Test-Path build\bin\hixns-agent.exe)"

          & $nsisPath scripts\installer.nsi
          $exitCode = $LASTEXITCODE
          Pop-Location

          if ($exitCode -ne 0) { throw "NSIS exit code: $exitCode" }

          Write-Host "=== Result ==="
          Get-ChildItem build\bin\*.exe | Format-Table Name, @{N='Size(MB)';E={[math]::Round($_.Length/1MB,1)}}

      # Linux: 构建 AppImage（用 appimagetool 代替 linuxdeploy）
      - name: Build Linux AppImage
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          BINARY="build/bin/${{ matrix.asset }}"
          if [ ! -f "$BINARY" ]; then
            echo "::error::Binary not found: $BINARY"
            find build/bin -type f 2>/dev/null || true
            exit 1
          fi

          APPDIR="$GITHUB_WORKSPACE/AppDir"
          rm -rf "$APPDIR"
          mkdir -p "$APPDIR/usr/bin" "$APPDIR/usr/share/icons/hicolor/256x256/apps"

          # 复制二进制
          cp "$BINARY" "$APPDIR/usr/bin/hixns"
          chmod +x "$APPDIR/usr/bin/hixns"

          # 复制 Hermes（验证存在，不可静默跳过）
          if [ -d build/bin/hermes-agent ]; then
            cp -r build/bin/hermes-agent "$APPDIR/usr/bin/"
            echo "hermes-agent copied"
          else
            echo "::warning::hermes-agent directory not found, AppImage will not include Hermes"
          fi
          if [ -d build/bin/hermes-python ]; then
            cp -r build/bin/hermes-python "$APPDIR/usr/bin/"
            echo "hermes-python copied"
          else
            echo "::warning::hermes-python directory not found, AppImage will not include embedded Python"
          fi

          # .desktop 文件
          echo '[Desktop Entry]' > "$APPDIR/hixns.desktop"
          echo 'Name=HiXNS' >> "$APPDIR/hixns.desktop"
          echo 'Comment=Hi!XNS AI Agent Desktop' >> "$APPDIR/hixns.desktop"
          echo 'Exec=hixns' >> "$APPDIR/hixns.desktop"
          echo 'Icon=hixns' >> "$APPDIR/hixns.desktop"
          echo 'Type=Application' >> "$APPDIR/hixns.desktop"
          echo 'Categories=Utility;' >> "$APPDIR/hixns.desktop"

          # 图标
          if [ -f build/appicon.png ]; then
            cp build/appicon.png "$APPDIR/hixns.png"
            cp build/appicon.png "$APPDIR/usr/share/icons/hicolor/256x256/apps/hixns.png"
          else
            # 生成占位图标 - 用 base64 解码一个预生成的 256x256 纯色 PNG
            echo '' | base64 -d > "$APPDIR/hixns.png"
          fi

          # AppRun
          echo '#!/bin/bash' > "$APPDIR/AppRun"
          echo 'HERE="$(dirname "$(readlink -f "${0}")")"' >> "$APPDIR/AppRun"
          echo 'export PATH="$HERE/usr/bin:$PATH"' >> "$APPDIR/AppRun"
          echo 'export LD_LIBRARY_PATH="$HERE/usr/lib:$LD_LIBRARY_PATH"' >> "$APPDIR/AppRun"
          echo 'exec "$HERE/usr/bin/hixns" "$@"' >> "$APPDIR/AppRun"
          chmod +x "$APPDIR/AppRun"

          echo "=== AppDir contents ==="
          find "$APPDIR" -maxdepth 3 -type f | head -30

          # 下载 appimagetool
          echo "=== Downloading appimagetool ==="
          curl -fsSL "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage" -o /tmp/appimagetool
          chmod +x /tmp/appimagetool

          export APPIMAGE_EXTRACT_AND_RUN=1
          export OUTPUT="$GITHUB_WORKSPACE/build/bin/HiXNS-Linux-x86_64.AppImage"

          echo "=== Running appimagetool ==="
          /tmp/appimagetool "$APPDIR" "$OUTPUT" 2>&1 || {
            echo "::error::appimagetool failed, trying with --verbose"
            /tmp/appimagetool --verbose "$APPDIR" "$OUTPUT" 2>&1 || true
          }

          # 验证
          if [ ! -f "build/bin/HiXNS-Linux-x86_64.AppImage" ]; then
            echo "::error::AppImage not found after build"
            find build/bin -type f 2>/dev/null || true
            exit 1
          fi
          chmod +x "build/bin/HiXNS-Linux-x86_64.AppImage"
          echo "=== Success ==="
          ls -lh "build/bin/HiXNS-Linux-x86_64.AppImage"

      # macOS: 用 create-dmg
      - name: Build macOS DMG
        if: runner.os == 'macOS'
        shell: bash
        run: |
          # Wails 在 macOS 上生成 .app bundle
          APP_BUNDLE="build/bin/${{ matrix.asset }}.app"
          if [ ! -d "$APP_BUNDLE" ]; then
            BINARY="build/bin/${{ matrix.asset }}"
            if [ -f "$BINARY" ]; then
              echo "Binary found, creating .app bundle manually"
              APP_BUNDLE="build/bin/HiXNS.app"
              mkdir -p "$APP_BUNDLE/Contents/MacOS" "$APP_BUNDLE/Contents/Resources"
              cp "$BINARY" "$APP_BUNDLE/Contents/MacOS/hixns-agent"
              # Info.plist — use echo to avoid YAML heredoc indentation issues
              {
                echo '<?xml version="1.0" encoding="UTF-8"?>'
                echo '<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">'
                echo '<plist version="1.0">'
                echo '<dict>'
                echo '    <key>CFBundleName</key><string>Hi!XNS</string>'
                echo '    <key>CFBundleDisplayName</key><string>Hi!XNS</string>'
                echo '    <key>CFBundleIdentifier</key><string>com.hixns.agent</string>'
                echo '    <key>CFBundleVersion</key><string>1.0.0</string>'
                echo '    <key>CFBundleShortVersionString</key><string>1.0.0</string>'
                echo '    <key>LSMinimumSystemVersion</key><string>12.0</string>'
                echo '    <key>CFBundleExecutable</key><string>hixns-agent</string>'
                echo '</dict>'
                echo '</plist>'
              } > "$APP_BUNDLE/Contents/Info.plist"
            else
              echo "::error::No macOS binary or .app found"
              find build/bin -type f
              exit 1
            fi
          fi

          echo "=== App bundle ==="
          find "$APP_BUNDLE" -maxdepth 3 -type f | head -20

          # 复制 Hermes 到 .app 内
          MACOS_DIR="$APP_BUNDLE/Contents/MacOS"
          if [ -d build/bin/hermes-agent ]; then
            cp -r build/bin/hermes-agent "$MACOS_DIR/"
            echo "hermes-agent copied to macOS bundle"
          else
            echo "::warning::hermes-agent directory not found"
          fi
          if [ -d build/bin/hermes-python ]; then
            cp -r build/bin/hermes-python "$MACOS_DIR/"
            echo "hermes-python copied to macOS bundle"
          else
            echo "::warning::hermes-python directory not found"
          fi

          # 安装 create-dmg
          brew install create-dmg 2>/dev/null || true

          # 创建 DMG
          create-dmg \
            --volname "Hi!XNS" \
            --window-size 600 400 \
            "build/bin/HiXNS-macos.dmg" \
            "$APP_BUNDLE" 2>&1

          echo "=== DMG output ==="
          ls -lh "build/bin/HiXNS-macos.dmg" 2>/dev/null || echo "DMG not found"
          find build/bin -name "*.dmg" -type f

      # ── 5. 上传产物 ───────────────────────────────────
      - name: Upload Installer (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: HiXNS-Windows-x64-Setup.exe
          path: build/bin/HiXNS-Windows-x64-Setup.exe

      - name: Upload Installer (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: HiXNS-Linux-x86_64.AppImage
          path: build/bin/HiXNS-Linux-x86_64.AppImage

      - name: Upload Installer (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: HiXNS-macos.dmg
          path: build/bin/HiXNS-macos.dmg

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release
          for dir in artifacts/*/; do
            cp "$dir"* release/ 2>/dev/null || true
          done
          chmod +x release/*.AppImage 2>/dev/null || true
          echo "=== Release assets ==="
          ls -lh release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Hi!XNS ${{ github.ref_name }}"
          body: |
            ## Hi!XNS ${{ github.ref_name }}

            ### 全平台安装包 + Hermes 完整内嵌

            每个安装包都包含完整的 Hermes Agent 运行环境（Python 运行时 + 依赖预装），**开箱即用**。

            ### 下载

            | 平台 | 文件 | 说明 |
            |------|------|------|
            | **Windows** | `HiXNS-Windows-x64-Setup.exe` | NSIS 安装包，双击安装 |
            | **Linux** | `HiXNS-Linux-x86_64.AppImage` | AppImage，chmod +x 后运行 |
            | **macOS** | `HiXNS-macos.dmg` | DMG 安装包，拖拽安装 |

            ### 包含内容
            - Hi!XNS 桌面应用 (Wails v2)
            - Hermes Agent 完整运行环境
            - 内嵌 Python 运行时（无需系统安装 Python）
            - 所有依赖已预装

            ### 改进
            - 全平台安装包（NSIS / AppImage / DMG）
            - Hermes Agent 完整内嵌，开箱即用
            - 无边框窗口 + CSS 拖拽
            - 禁用右键菜单
            - 无启动白屏
          files: release/*
          draft: false
          prerelease: false
