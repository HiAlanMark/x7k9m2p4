name: 'Release Build'

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: darwin
            goarch: arm64
            platform: macos-latest
            name: 'HiXNS-macOS-arm64'
            ext: ''
          - goos: darwin
            goarch: amd64
            platform: macos-latest
            name: 'HiXNS-macOS-amd64'
            ext: ''
          - goos: windows
            goarch: amd64
            platform: ubuntu-22.04
            name: 'HiXNS-Windows-amd64'
            ext: '.exe'
          - goos: linux
            goarch: amd64
            platform: ubuntu-22.04
            name: 'HiXNS-Linux-amd64'
            ext: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: agent-go/go.sum

      - name: Build Frontend
        run: |
          npm install
          npx vite build

      - name: Copy frontend to Go embed directory
        run: cp -r dist agent-go/dist

      - name: Build Go binary (with embedded frontend)
        run: |
          cd agent-go
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} CGO_ENABLED=0 \
            go build -ldflags="-s -w" -o ../hixns-agent${{ matrix.ext }} .
          ls -lh ../hixns-agent${{ matrix.ext }}

      - name: Create release archive
        run: |
          if [ "${{ matrix.goos }}" = "windows" ]; then
            zip ${{ matrix.name }}.zip hixns-agent${{ matrix.ext }}
          else
            chmod +x hixns-agent${{ matrix.ext }}
            tar czf ${{ matrix.name }}.tar.gz hixns-agent${{ matrix.ext }}
          fi
        shell: bash

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          name: 'Hi!XNS ${{ github.ref_name }}'
          body: |
            ## Hi!XNS Desktop AI Agent ${{ github.ref_name }}
            
            单文件桌面 AI 应用，内置 30+ 工具、多轮对话、技能商店。
            
            ### 使用方法
            1. 下载对应平台的文件
            2. 解压后双击运行 `hixns-agent`
            3. 自动打开浏览器，即可使用
            
            ### 平台说明
            - **macOS arm64**: Apple Silicon (M1/M2/M3/M4)
            - **macOS amd64**: Intel Mac
            - **Windows**: 64位 Windows
            - **Linux**: 64位 Linux
            
            > 首次运行 macOS 可能需要：右键 → 打开 → 信任
          draft: false
          prerelease: false
          files: |
            ${{ matrix.name }}.zip
            ${{ matrix.name }}.tar.gz

      - name: Upload Artifacts (backup)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: hixns-agent${{ matrix.ext }}
