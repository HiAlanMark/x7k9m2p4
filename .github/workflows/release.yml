name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            goos: windows
            goarch: amd64
            ext: .exe
            asset: hixns-agent-windows-amd64.exe
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            ext: ""
            asset: hixns-agent-linux-amd64
          - os: macos-latest
            goos: darwin
            goarch: amd64
            ext: ""
            asset: hixns-agent-macos-amd64
          - os: macos-latest
            goos: darwin
            goarch: arm64
            ext: ""
            asset: hixns-agent-macos-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: agent-go/go.sum

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Copy frontend to Go embed dir
        shell: bash
        run: |
          rm -rf agent-go/dist
          cp -r dist agent-go/dist

      - name: Build Windows resource (Windows only)
        if: matrix.goos == 'windows'
        shell: bash
        run: |
          cd agent-go
          windres --preprocessor=cat resource.rc -o resource_windows_amd64.syso || echo "windres not available, using pre-built .syso"

      - name: Build Go binary
        env:
          CGO_ENABLED: 0
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          cd agent-go
          LDFLAGS="-s -w -X main.version=${{ github.ref_name }}"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            LDFLAGS="$LDFLAGS -H windowsgui"
          fi
          go build -ldflags="$LDFLAGS" -o ../build/${{ matrix.asset }} .
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: build/${{ matrix.asset }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release
          for dir in artifacts/*/; do
            cp "$dir"* release/ 2>/dev/null || true
          done
          chmod +x release/hixns-agent-linux-* release/hixns-agent-macos-* 2>/dev/null || true
          ls -lh release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Hi!XNS ${{ github.ref_name }}"
          body: |
            ## Hi!XNS ${{ github.ref_name }}

            ### 下载
            | 平台 | 文件 |
            |------|------|
            | Windows x64 | `hixns-agent-windows-amd64.exe` |
            | Linux x64 | `hixns-agent-linux-amd64` |
            | macOS Intel | `hixns-agent-macos-amd64` |
            | macOS Apple Silicon | `hixns-agent-macos-arm64` |

            ### 使用方式
            下载对应平台文件后直接运行，应用会在 `127.0.0.1:9800` 启动并弹出原生窗口。

            ### 更新内容
            - iOS 27 级毛玻璃 UI (blur 32-36px)
            - WebGL 极光背景动效
            - q弹 Spring 动画系统
            - 5 个 vue-bits 风格动效组件
            - 消息重新生成/复制/导出
            - 智能会话标题
            - 任务编辑/设置搜索/技能更新检测
          files: release/*
          draft: false
          prerelease: false
