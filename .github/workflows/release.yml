name: 'Release Build'

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: darwin
            goarch: arm64
            platform: macos-latest
            name: 'HiXNS-macOS-arm64'
            ext: ''
            ldflags: '-s -w'
          - goos: darwin
            goarch: amd64
            platform: macos-latest
            name: 'HiXNS-macOS-amd64'
            ext: ''
            ldflags: '-s -w'
          - goos: windows
            goarch: amd64
            platform: ubuntu-22.04
            name: 'HiXNS-Windows-amd64'
            ext: '.exe'
            ldflags: '-s -w -H windowsgui'
          - goos: linux
            goarch: amd64
            platform: ubuntu-22.04
            name: 'HiXNS-Linux-amd64'
            ext: ''
            ldflags: '-s -w'

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: agent-go/go.sum

      - name: Build Frontend
        run: |
          npm install
          npx vite build

      - name: Copy frontend to Go embed directory
        run: cp -r dist agent-go/dist

      - name: Build Go binary
        run: |
          cd agent-go
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} CGO_ENABLED=0 \
            go build -ldflags="${{ matrix.ldflags }}" -o ../HiXNS${{ matrix.ext }} .
          ls -lh ../HiXNS${{ matrix.ext }}

      - name: Create macOS .app bundle
        if: matrix.goos == 'darwin'
        run: |
          mkdir -p "HiXNS.app/Contents/MacOS" "HiXNS.app/Contents/Resources"
          cp HiXNS "HiXNS.app/Contents/MacOS/HiXNS"
          chmod +x "HiXNS.app/Contents/MacOS/HiXNS"
          cat > "HiXNS.app/Contents/Info.plist" << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
            <key>CFBundleName</key><string>HiXNS</string>
            <key>CFBundleDisplayName</key><string>Hi!XNS</string>
            <key>CFBundleIdentifier</key><string>com.hixns.desktop</string>
            <key>CFBundleVersion</key><string>0.1.0</string>
            <key>CFBundleExecutable</key><string>HiXNS</string>
            <key>CFBundlePackageType</key><string>APPL</string>
            <key>NSHighResolutionCapable</key><true/>
          </dict></plist>
          EOF
          tar czf ${{ matrix.name }}.tar.gz HiXNS.app

      - name: Create archive (Linux)
        if: matrix.goos == 'linux'
        run: |
          chmod +x HiXNS
          tar czf ${{ matrix.name }}.tar.gz HiXNS

      - name: Create archive (Windows)
        if: matrix.goos == 'windows'
        run: zip ${{ matrix.name }}.zip HiXNS.exe

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          name: 'Hi!XNS ${{ github.ref_name }}'
          body: |
            ## Hi!XNS Desktop AI Agent ${{ github.ref_name }}

            单文件桌面 AI 应用，原生窗口，内置 30+ 工具、多轮对话、技能商店。

            ### 安装
            - **Windows**: 下载 `.zip` 解压，双击 `HiXNS.exe` 运行
            - **macOS**: 下载 `.tar.gz` 解压，将 `HiXNS.app` 拖入 Applications
            - **Linux**: 下载 `.tar.gz` 解压，`chmod +x HiXNS && ./HiXNS`

            > macOS 首次运行：系统设置 → 隐私与安全性 → 仍要打开
          draft: false
          prerelease: false
          files: |
            ${{ matrix.name }}.zip
            ${{ matrix.name }}.tar.gz
