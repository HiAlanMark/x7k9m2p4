version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production          # 指定构建到 production 阶段
    image: my-node-app:latest
    container_name: my-node-app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
    restart: unless-stopped
    # 资源限制
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
