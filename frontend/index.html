<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hi!XNS</title>
    <style>
      /* ===== CSS Variables ===== */
      :root {
        /* Typography */
        --font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        --font-mono: 'SF Mono', 'Fira Code', Consolas, monospace;
        --text-xs: 11px; --text-sm: 12px; --text-md: 13px; --text-lg: 14px;
        --text-xl: 16px; --text-2xl: 20px; --text-3xl: 24px; --text-4xl: 32px;
        --font-normal: 400; --font-medium: 500; --font-semibold: 600; --font-bold: 700;
        --leading-tight: 1.25; --leading-normal: 1.5; --leading-relaxed: 1.75;
        
        /* Colors - Dark Theme */
        --color-bg-page: #0a0a0f;
        --color-bg-card: rgba(255,255,255,0.03);
        --color-bg-input: rgba(255,255,255,0.06);
        --color-bg-hover: rgba(255,255,255,0.08);
        --color-bg-active: rgba(255,255,255,0.12);
        
        --color-primary: #0A84FF;
        --color-primary-light: rgba(10,132,255,0.15);
        --color-primary-dark: #0066CC;
        --color-primary-glow: rgba(10,132,255,0.4);
        
        --color-secondary: #BF5AF2;
        --color-secondary-light: rgba(191,90,242,0.15);
        --color-secondary-dark: #9D40D6;
        
        --color-success: #30D158;
        --color-warning: #FF9F0A;
        --color-error: #FF453A;
        --color-info: #5AC8FA;
        
        --color-text-primary: rgba(255,255,255,0.95);
        --color-text-secondary: rgba(255,255,255,0.7);
        --color-text-tertiary: rgba(255,255,255,0.45);
        --color-text-disabled: rgba(255,255,255,0.25);
        
        --color-border: rgba(255,255,255,0.08);
        --color-border-light: rgba(255,255,255,0.12);
        --color-border-strong: rgba(255,255,255,0.18);
        
        /* Glassmorphism */
        --glass-bg: rgba(255,255,255,0.04);
        --glass-bg-strong: rgba(255,255,255,0.08);
        --glass-blur: 24px;
        --glass-saturate: 1.2;
        --glass-border: rgba(255,255,255,0.08);
        --glass-border-strong: rgba(255,255,255,0.15);
        --glass-shadow: 0 8px 32px rgba(0,0,0,0.3);
        --glass-shadow-inset: inset 0 1px 0 rgba(255,255,255,0.05);
        
        /* Shadows */
        --shadow-sm: 0 1px 2px rgba(0,0,0,0.3);
        --shadow-md: 0 4px 12px rgba(0,0,0,0.4);
        --shadow-lg: 0 8px 24px rgba(0,0,0,0.5);
        --shadow-xl: 0 16px 48px rgba(0,0,0,0.6);
        --shadow-card: 0 2px 8px rgba(0,0,0,0.2);
        --shadow-card-hover: 0 8px 24px rgba(0,0,0,0.3);
        
        /* Border radius */
        --radius-xs: 4px; --radius-sm: 6px; --radius-md: 8px;
        --radius-lg: 12px; --radius-xl: 16px; --radius-2xl: 20px; --radius-full: 9999px;
        --radius-btn: var(--radius-md);
        --radius-card: var(--radius-xl);
        --radius-input: var(--radius-md);
        --radius-modal: var(--radius-2xl);
        
        /* Spacing */
        --space-1: 4px; --space-2: 8px; --space-3: 12px; --space-4: 16px;
        --space-5: 20px; --space-6: 24px; --space-8: 32px; --space-10: 40px;
        --space-12: 48px; --space-16: 64px; --space-20: 80px; --space-24: 96px;
        
        /* Animation - iOS Spring */
        --spring-smooth: cubic-bezier(0.25,0.1,0.25,1);
        --spring-bounce: cubic-bezier(0.34,1.56,0.64,1);
        --spring-snap: cubic-bezier(0.2,0.8,0.2,1);
        --ease-out-expo: cubic-bezier(0.16,1,0.3,1);
        --duration-fast: 150ms;
        --duration-normal: 250ms;
        --duration-slow: 350ms;
        --duration-slower: 500ms;
        --transition-fast: var(--duration-fast) var(--spring-smooth);
        --transition-normal: var(--duration-normal) var(--spring-smooth);
        --transition-slow: var(--duration-slow) var(--spring-bounce);
        
        /* Z-index */
        --z-dropdown: 100; --z-sticky: 200; --z-overlay: 300;
        --z-modal: 400; --z-toast: 500; --z-tooltip: 600;
      }
      
      /* Light Theme */
      [data-theme="light"] {
        --color-bg-page: #f5f5f7;
        --color-bg-card: rgba(255,255,255,0.8);
        --color-bg-input: rgba(255,255,255,0.6);
        --color-bg-hover: rgba(255,255,255,0.9);
        --color-primary: #0066CC;
        --color-primary-light: rgba(0,102,204,0.1);
        --color-text-primary: rgba(0,0,0,0.95);
        --color-text-secondary: rgba(0,0,0,0.7);
        --color-text-tertiary: rgba(0,0,0,0.45);
        --color-border: rgba(0,0,0,0.08);
        --glass-bg: rgba(255,255,255,0.7);
        --glass-bg-strong: rgba(255,255,255,0.85);
        --glass-border: rgba(0,0,0,0.08);
        --glass-shadow: 0 8px 32px rgba(0,0,0,0.1);
        --shadow-card: 0 2px 8px rgba(0,0,0,0.06);
        --shadow-card-hover: 0 8px 24px rgba(0,0,0,0.1);
      }
      
      /* ===== Reset & Base ===== */
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      
      html {
        font-size: 16px;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        text-rendering: optimizeLegibility;
      }
      
      body {
        font-family: var(--font-family);
        font-weight: var(--font-normal);
        line-height: var(--leading-normal);
        color: var(--color-text-primary);
        background: var(--color-bg-page);
        overflow: hidden;
      }
      
      html, body, #app { height: 100%; }
      
      #app {
        position: relative;
        background: var(--color-bg-page);
      }
      
      /* Prevent white flash on load */
      @media (prefers-color-scheme: dark) {
        body { background: #0a0a0f; }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
