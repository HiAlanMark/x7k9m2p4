<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hi!XNS</title>
    <style>
      /* ===== CSS Variables — Hi!XNS Design System ===== */
      :root {
        /* Typography */
        --font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        --font-mono: 'SF Mono', 'Fira Code', Consolas, monospace;
        --text-xs: 11px; --text-sm: 12px; --text-md: 13px; --text-lg: 14px;
        --text-xl: 16px; --text-2xl: 20px; --text-3xl: 24px; --text-4xl: 32px;
        --font-normal: 400; --font-medium: 500; --font-semibold: 600; --font-bold: 700;
        --leading-tight: 1.25; --leading-normal: 1.5; --leading-relaxed: 1.75;
        
        /* Colors - Dark Theme (Deep Space) */
        --bg-base: #050507;
        --bg-surface: #0a0a0f;
        --bg-elevated: #0f0f16;
        --bg-overlay: rgba(0, 0, 0, 0.6);
        
        /* Glass surfaces */
        --glass-weak:   rgba(255, 255, 255, 0.02);
        --glass-base:   rgba(255, 255, 255, 0.04);
        --glass-strong: rgba(255, 255, 255, 0.07);
        --glass-solid:  rgba(255, 255, 255, 0.1);
        
        /* Primary — Glass Light Blue */
        --primary: rgba(90, 200, 250, 0.2);
        --primary-light: rgba(90, 200, 250, 0.1);
        --primary-dark: rgba(90, 200, 250, 0.3);
        --primary-glow: rgba(90, 200, 250, 0.35);
        --primary-glow-sm: rgba(90, 200, 250, 0.2);
        --primary-text: rgba(90, 200, 250, 0.95);
        --primary-border: rgba(90, 200, 250, 0.45);
        
        /* Secondary — Nebula Purple */
        --secondary: #BF5AF2;
        --secondary-light: rgba(191, 90, 242, 0.08);
        --secondary-dark: #9D40D6;
        --secondary-glow: rgba(191, 90, 242, 0.3);
        
        /* Accent — Cyber Cyan */
        --accent: #5AC8FA;
        --accent-light: rgba(90, 200, 250, 0.08);
        --accent-glow: rgba(90, 200, 250, 0.3);
        
        /* Semantic */
        --success: #30D158;
        --warning: #FF9F0A;
        --error: #FF453A;
        --info: #5AC8FA;
        
        --success-glow: rgba(48, 209, 88, 0.3);
        --warning-glow: rgba(255, 159, 10, 0.3);
        --error-glow: rgba(255, 69, 58, 0.3);
        
        /* Text hierarchy */
        --text-primary: rgba(255, 255, 255, 0.95);
        --text-secondary: rgba(255, 255, 255, 0.65);
        --text-tertiary: rgba(255, 255, 255, 0.38);
        --text-disabled: rgba(255, 255, 255, 0.22);
        --text-inverse: rgba(0, 0, 0, 0.92);
        
        /* Borders */
        --border-base: rgba(255, 255, 255, 0.06);
        --border-light: rgba(255, 255, 255, 0.1);
        --border-strong: rgba(255, 255, 255, 0.15);
        --border-glow: rgba(10, 132, 255, 0.5);
        --border-focus: rgba(10, 132, 255, 0.6);
        
        /* Glassmorphism */
        --blur-sm: 12px;
        --blur-base: 24px;
        --blur-lg: 32px;
        --blur-xl: 48px;
        --saturate: 1.4;
        
        --glass-bg: rgba(255, 255, 255, 0.04);
        --glass-bg-hover: rgba(255, 255, 255, 0.06);
        --glass-border: rgba(255, 255, 255, 0.06);
        --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        --glass-inset: inset 0 1px 0 rgba(255, 255, 255, 0.04);
        
        /* Shadows */
        --shadow-xs: 0 1px 2px rgba(0, 0, 0, 0.2);
        --shadow-sm: 0 2px 4px rgba(0, 0, 0, 0.25);
        --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.3);
        --shadow-lg: 0 8px 24px rgba(0, 0, 0, 0.35);
        --shadow-xl: 0 16px 48px rgba(0, 0, 0, 0.45);
        --shadow-2xl: 0 24px 64px rgba(0, 0, 0, 0.5);
        
        /* Glow effects */
        --glow-sm: 0 0 8px rgba(90, 200, 250, 0.2);
        --glow-md: 0 0 12px rgba(90, 200, 250, 0.35), 0 0 24px rgba(10, 132, 255, 0.15);
        --glow-lg: 0 0 16px rgba(90, 200, 250, 0.35), 0 0 32px rgba(10, 132, 255, 0.2), 0 0 48px rgba(10, 132, 255, 0.1);
        --glow-inner: inset 0 0 8px rgba(10, 132, 255, 0.05);
        
        /* Border radius */
        --radius-xs: 4px; --radius-sm: 6px; --radius-md: 8px;
        --radius-lg: 12px; --radius-xl: 16px; --radius-2xl: 20px; --radius-full: 9999px;
        
        /* Spacing (4px grid) */
        --space-1: 4px; --space-2: 8px; --space-3: 12px; --space-4: 16px;
        --space-5: 20px; --space-6: 24px; --space-8: 32px; --space-10: 40px;
        --space-12: 48px; --space-16: 64px; --space-20: 80px; --space-24: 96px;
        
        /* Animation - iOS Spring */
        --ease-sine: cubic-bezier(0.37, 0, 0.63, 1);
        --ease-quad: cubic-bezier(0.45, 0, 0.55, 1);
        --ease-cubic: cubic-bezier(0.32, 0, 0.67, 0);
        --ease-expo: cubic-bezier(0.16, 1, 0.3, 1);
        --ease-back: cubic-bezier(0.34, 1.56, 0.64, 1);
        --ease-spring: cubic-bezier(0.25, 0.1, 0.25, 1);
        --fast: 150ms var(--ease-spring);
        --normal: 250ms var(--ease-spring);
        --slow: 350ms var(--ease-back);
        
        /* Z-index */
        --z-dropdown: 100; --z-sticky: 200; --z-overlay: 300;
        --z-modal: 400; --z-toast: 500; --z-tooltip: 600;
      }
      
      /* Light Theme */
      [data-theme="light"] {
        --bg-base: #f5f5f7;
        --bg-surface: #ffffff;
        --bg-elevated: #f0f0f0;
        --text-primary: rgba(0, 0, 0, 0.95);
        --text-secondary: rgba(0, 0, 0, 0.7);
        --text-tertiary: rgba(0, 0, 0, 0.45);
        --border-base: rgba(0, 0, 0, 0.08);
        --border-light: rgba(0, 0, 0, 0.12);
        --glass-bg: rgba(255, 255, 255, 0.7);
        --glass-bg-hover: rgba(255, 255, 255, 0.85);
        --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
      }
      
      /* ===== Reset & Base ===== */
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      
      html {
        font-size: 16px;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        text-rendering: optimizeLegibility;
      }
      
      body {
        font-family: var(--font-family);
        font-weight: var(--font-normal);
        line-height: var(--leading-normal);
        color: var(--text-primary);
        background: var(--bg-base);
        overflow: hidden;
      }
      
      html, body, #app { height: 100%; }
      
      #app {
        position: relative;
        background: var(--bg-base);
      }
      
      /* Prevent white flash on load */
      @media (prefers-color-scheme: dark) {
        body { background: #0a0a0f; }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
